name: Release

# Publishes @felt-ui/react to npm when a version tag is pushed.
#
#   npm version 0.1.0      # bumps package.json + commits + tags v0.1.0
#   git push --follow-tags
#
# One-time setup: add an automation token as the NPM_TOKEN repo secret.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      # Gate the publish on a green build.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
